name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (pyproject requires-python >=3.10) and a recent release.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: pip install -e . pytest
      - name: Run tests
        # Suite is fully offline (FakeEdgar + committed fixtures); no network or secrets.
        run: pytest
